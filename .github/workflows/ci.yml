name: Test and sync

on:
  push:
  workflow_dispatch:
    inputs:
      run_e2e:
        description: Run e2e tests against live R2 bucket
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install bats
        run: npm install -g bats

      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck

      - name: Shellcheck
        run: shellcheck r2_sync.sh

      - name: Unit tests
        run: bats tests/unit.bats

  e2e:
    runs-on: ubuntu-latest
    needs: unit
    if: >
      github.event_name == 'workflow_dispatch' &&
      inputs.run_e2e == true
    steps:
      - uses: actions/checkout@v4

      - name: Install bats
        run: npm install -g bats

      - name: Install awscli
        run: pip3 install awscli --break-system-packages

      - name: E2E tests
        env:
          R2_ACCESS_KEY_ID:     ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ACCOUNT_ID:        ${{ secrets.R2_ACCOUNT_ID }}
          R2_BUCKET:            ${{ secrets.R2_TEST_BUCKET }}
          CDN_DOMAIN:           ${{ secrets.R2_TEST_CDN_DOMAIN }}
        run: bats tests/e2e.bats
